<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C-Wash Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:url('https://images.unsplash.com/photo-1502877338535-766e1452684a') center/cover;
}

.hero h1{
  font-size:80px;
}

/* HORIZONTAL SCROLL */
.scroll-container{
  display:flex;
  height:100vh;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
}

.panel{
  min-width:100vw;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  scroll-snap-align:start;
  position:relative;
}

.panel:nth-child(1){background:#111}
.panel:nth-child(2){background:#222}
.panel:nth-child(3){background:#111}
.panel:nth-child(4){background:#222}

.panel h2{
  font-size:60px;
}

/* IMAGE PARALLAX */
.panel img{
  position:absolute;
  width:80%;
  opacity:0.3;
  transition:0.5s;
}

.panel:hover img{
  transform:scale(1.2);
  opacity:0.5;
}

/* SLIDER */
.slider{
  display:flex;
  overflow-x:auto;
  gap:20px;
  padding:40px;
}

.slide{
  min-width:300px;
  height:400px;
  background:#111;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  transition:0.3s;
}

.slide:hover{
  transform:scale(1.1);
}

/* FLOAT BUTTON */
.cta{
  position:fixed;
  bottom:20px;
  right:20px;
  background:white;
  color:black;
  padding:15px 25px;
  border-radius:40px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="hero">
  <h1>FEEL NEW</h1>
</div>

<div class="scroll-container">

  <div class="panel">
    <img src="https://images.unsplash.com/photo-1603386329225-868f9b1ee6c7">
    <h2>Basic Wash</h2>
  </div>

  <div class="panel">
    <img src="https://images.unsplash.com/photo-1597007066704-67bf2068d3b2">
    <h2>Full Detail</h2>
  </div>

  <div class="panel">
    <img src="https://images.unsplash.com/photo-1583267746897-2cf415887172">
    <h2>Polish & Wax</h2>
  </div>

  <div class="panel">
    <img src="https://images.unsplash.com/photo-1619767886558-efdc259cde1a">
    <h2>Interior Clean</h2>
  </div>

</div>

<div class="slider">
  <div class="slide">Shine</div>
  <div class="slide">Clean</div>
  <div class="slide">Detail</div>
  <div class="slide">Premium</div>
</div>

<div class="cta">
  WhatsApp
</div>

</body>
</html>
