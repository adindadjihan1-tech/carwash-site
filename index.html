<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C-Wash Premium Detailing</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#0b0f1a;
  color:white;
  scroll-behavior:smooth;
}

/* GRADIENT BACKGROUND */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle at 20% 30%,#00ffc333,transparent),
    radial-gradient(circle at 80% 70%,#0077ff33,transparent);
  filter:blur(120px);
  z-index:-1;
}

/* NAV */
nav{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
}

nav a{
  color:white;
  text-decoration:none;
  margin-left:10px;
}

/* HERO */
.hero{
  height:100vh;
  background:url('https://images.unsplash.com/photo-1502877338535-766e1452684a') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero h1{
  font-family:Poppins;
  font-size:50px;
}

.hero p{
  max-width:500px;
  margin:auto;
}

.btn{
  display:inline-block;
  margin:10px;
  padding:12px 20px;
  border-radius:50px;
  background:linear-gradient(45deg,#00ffc3,#0077ff);
  text-decoration:none;
  color:white;
  transition:.3s;
}
.btn:hover{
  transform:scale(1.1);
}

/* SERVICES */
.services{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:40px;
}

.card{
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  transition:.3s;
}
.card:hover{
  transform:translateY(-10px);
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
}
.gallery img{
  width:100%;
  height:150px;
  object-fit:cover;
}

/* TESTIMONIAL */
.testimonials{
  padding:40px;
}

/* CONTACT */
.contact{
  padding:40px;
}

/* FLOAT BUTTON */
.wa{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25d366;
  padding:15px;
  border-radius:50%;
}
</style>
</head>

<body>

<nav>
  <div><b>C-Wash</b></div>
  <div>
    <a href="tel:08XXXXXXXXXX">Call</a>
    <a href="https://wa.me/628XXXXXXXXXX">WhatsApp</a>
  </div>
</nav>

<div class="hero">
  <div>
    <h1>Make Your Car Look Brand New</h1>
    <p>Fast, premium car wash and detailing with real results.</p>
    <a href="tel:08XXXXXXXXXX" class="btn">Call Now</a>
    <a href="https://wa.me/628XXXXXXXXXX" class="btn">WhatsApp</a>
  </div>
</div>

<div class="services">
  <div class="card">Basic Wash</div>
  <div class="card">Full Detailing</div>
  <div class="card">Polish & Wax</div>
  <div class="card">Interior Cleaning</div>
</div>

<div class="gallery">
  <img src="https://images.unsplash.com/photo-1603386329225-868f9b1ee6c7">
  <img src="https://images.unsplash.com/photo-1597007066704-67bf2068d3b2">
  <img src="https://images.unsplash.com/photo-1583267746897-2cf415887172">
</div>

<div class="testimonials">
  <p>★★★★★ “Very clean result!”</p>
  <p>★★★★★ “Worth the price.”</p>
</div>

<div class="contact">
  <h2>Contact Us</h2>
  <p>Call or WhatsApp now for fast service.</p>
</div>

<a href="https://wa.me/628XXXXXXXXXX" class="wa">💬</a>

</body>
</html>
