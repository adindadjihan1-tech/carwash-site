<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>C-Wash Experience</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* FULLSCREEN HERO VIDEO STYLE */
.hero{
  height:100vh;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
}

.hero img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(40%);
}

.hero h1{
  font-size:80px;
  z-index:2;
  mix-blend-mode:screen;
}

/* FLOAT TEXT SECTION */
.section{
  padding:120px 20px;
  max-width:900px;
  margin:auto;
  font-size:22px;
  line-height:1.6;
}

/* PARALLAX IMAGE */
.image-block{
  height:80vh;
  background:url('https://images.unsplash.com/photo-1603386329225-868f9b1ee6c7') center/cover;
  background-attachment:fixed;
}

/* SPLIT TEXT */
.split{
  display:flex;
  padding:80px 20px;
}

.split div{
  flex:1;
  padding:20px;
}

.split h2{
  font-size:50px;
}

/* CHAOTIC BUTTON */
.cta{
  position:fixed;
  bottom:20px;
  right:20px;
  background:white;
  color:black;
  padding:15px 25px;
  border-radius:40px;
  cursor:pointer;
  transition:.3s;
}

.cta:hover{
  transform:scale(1.2) rotate(3deg);
}

/* SCROLL FADE */
.fade{
  opacity:0;
  transform:translateY(50px);
  transition:1s;
}
.show{
  opacity:1;
  transform:none;
}
</style>
</head>

<body>

<div class="hero">
  <img src="https://images.unsplash.com/photo-1502877338535-766e1452684a">
  <h1>FEEL NEW AGAIN</h1>
</div>

<div class="section fade">
  Your car doesn’t need just a wash.  
  It needs a reset.
</div>

<div class="image-block"></div>

<div class="split fade">
  <div>
    <h2>Not a wash.</h2>
  </div>
  <div>
    A transformation experience designed to bring back the original feel.
  </div>
</div>

<div class="section fade">
  Fast. Clean. Done right.  
  No complicated process. Just results.
</div>

<div class="cta">
  WhatsApp Now
</div>

<script>
const faders = document.querySelectorAll('.fade');

window.addEventListener('scroll', ()=>{
  faders.forEach(el=>{
    const rect = el.getBoundingClientRect();
    if(rect.top < window.innerHeight - 100){
      el.classList.add('show');
    }
  });
});
</script>

</body>
</html>
